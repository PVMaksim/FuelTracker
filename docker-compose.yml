services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    mem_limit: 64m
    mem_reservation: 32m
    ports:
      - "8090:80"
      - "9443:9443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

volumes:
  postgres_data:
  certbot_webroot:
  certbot_certs: