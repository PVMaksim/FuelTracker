name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Пересобираем документацию только при изменениях в этих путях
      - "docs/**"
      - "mkdocs.yml"
      - "docs-requirements.txt"
      - "backend/src/**/*.py"   # mkdocstrings читает docstrings из исходников

  # Позволяет запустить вручную из вкладки Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Запрещаем параллельные деплои документации
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # Нужен полный history для git-revision-date плагина

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs-requirements.txt

      - name: Install MkDocs dependencies
        run: pip install -r docs-requirements.txt

      - name: Install backend dependencies
        # mkdocstrings импортирует исходники для извлечения docstrings
        run: pip install -r backend/requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict --verbose
        # --strict: превращает предупреждения в ошибки (сломанные ссылки и т.д.)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/   # mkdocs build выводит в ./site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.ADMIN_TELEGRAM_ID }}" \
            -d text="📚 Документация FuelTracker обновлена%0A${{ steps.deployment.outputs.page_url }}" \
            -d parse_mode="HTML"
